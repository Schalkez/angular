<div class="todo-list">
  @for (todo of todos; track todo.id) {
    <app-todo-item
      [todo]="todo"
      (toggleTodo)="toggleTodo.emit($event)"
      (deleteTodo)="deleteTodo.emit($event)"
    />
  } @empty {
    <div class="empty-state">
      <p>No tasks yet. Add one above!</p>
    </div>
  }
</div>
