<div>
  <form (ngSubmit)="onSubmit()" class="todo-form">
    <input
      type="text"
      [formControl]="titleControl"
      placeholder="What needs to be done?"
      class="todo-input"
      autocomplete="off"
    />
    <button type="submit" class="todo-button" [disabled]="titleControl.invalid">Add</button>
  </form>

  @if (titleControl.invalid && (titleControl.dirty || titleControl.touched)) {
    <span class="error-message">
      @if (titleControl.errors?.['required']) {
        Please enter a task title.
      } @else if (titleControl.errors?.['pattern']) {
        Task cannot be empty or just spaces.
      }
    </span>
  }
</div>
